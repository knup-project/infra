name: OpenTofu

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

# Cancel a stale plan when the PR gets a new push — there's no point
# finishing a 2-minute plan for a commit the author has already replaced.
# Apply, conversely, must NEVER be cancelled mid-flight (see the apply job).
concurrency:
  group: opentofu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # OCI provider auth (API key)
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
  TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
  TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
  TF_VAR_region: ${{ secrets.OCI_REGION }}
  TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_private_key_path: /home/runner/.oci/oci_api_key.pem
  # S3-compatible remote state backend (OCI Object Storage Customer Secret Key)
  AWS_ACCESS_KEY_ID: ${{ secrets.STATE_S3_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.STATE_S3_SECRET_ACCESS_KEY }}
  AWS_REGION: ap-chuncheon-1

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.1"
      # Cache the provider plugin tree keyed on the lockfile so re-runs skip
      # the ~80 MB oracle/oci download. Bust automatically when the lock changes.
      - uses: actions/cache@v4
        with:
          path: .terraform
          key: tofu-${{ runner.os }}-${{ hashFiles('.terraform.lock.hcl') }}
          restore-keys: |
            tofu-${{ runner.os }}-
      - name: fmt -check
        run: tofu fmt -check -recursive -diff
      - name: Write OCI API key
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p /home/runner/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > /home/runner/.oci/oci_api_key.pem
          chmod 600 /home/runner/.oci/oci_api_key.pem
      - run: tofu init -input=false
      - run: tofu validate -no-color
      - name: Plan
        id: plan
        run: tofu plan -no-color -input=false
        continue-on-error: true
      # Sticky comment: every push edits the same PR comment instead of
      # appending a new one, so the PR conversation doesn't fill up with
      # stale plans after a few force-pushes.
      - name: Comment PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: opentofu-plan
          message: |
            #### OpenTofu Plan
            ```
            ${{ steps.plan.outputs.stdout || 'See workflow logs' }}
            ```

  apply:
    name: Apply
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.1"
      - name: Write OCI API key
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p /home/runner/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > /home/runner/.oci/oci_api_key.pem
          chmod 600 /home/runner/.oci/oci_api_key.pem
      - run: tofu init -input=false
      - run: tofu apply -auto-approve -input=false
