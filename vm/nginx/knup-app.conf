# /etc/nginx/sites-available/knup-app.conf  (symlink into sites-enabled)
# Reverse proxy: public 80/443 -> backend container on 127.0.0.1:8080.
# `certbot --nginx` rewrites this to add the 443 server + redirect once a
# domain is pointed at the VM (see docs/HTTPS.md).
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / STOMP (/ws) upgrade support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
    }
}
